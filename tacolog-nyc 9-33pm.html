// ─── SCORING ──────────────────────────────────────────────────────────────────
function scoreLocation(address,locReviews){
  if(!locReviews||locReviews.length===0)return null;
  const ratings=locReviews.filter(r=>r.rating).map(r=>r.rating);
  const avgRating=ratings.length?ratings.reduce((a,b)=>a+b,0)/ratings.length:0;
  const ratingScore=(avgRating/5)*35;
  const safetyScores=locReviews.filter(r=>r.safetyLight).map(r=>r.safetyLight==="green"?1:r.safetyLight==="yellow"?0.5:0);
  const avgSafety=safetyScores.length?safetyScores.reduce((a,b)=>a+b,0)/safetyScores.length:0.7;
  const safetyScore=avgSafety*30;
  const shoutouts=locReviews.filter(r=>r.employees&&r.employees.trim()).length;
  const shoutoutScore=Math.min(shoutouts/5,1)*20;
  const prices=locReviews.filter(r=>r.price&&parseFloat(r.price)>0).map(r=>parseFloat(r.price));
  let priceScore=7.5;
  if(prices.length){const avg=prices.reduce((a,b)=>a+b,0)/prices.length;priceScore=avg<=3?15:avg>=8?0:((8-avg)/5)*15;}
  return{total:Math.min(Math.round(ratingScore+safetyScore+shoutoutScore+priceScore),100),ratingScore:Math.round(ratingScore),safetyScore:Math.round(safetyScore),shoutoutScore:Math.round(shoutoutScore),priceScore:Math.round(priceScore),reviewCount:locReviews.length,avgRating,avgSafety,shoutouts,avgPrice:prices.length?prices.reduce((a,b)=>a+b,0)/prices.length:null};
}
function getPopularityTier(score){
  if(score===null||score===undefined)return{label:"Unrated",color:"#4a3070",bg:"rgba(74,48,112,0.15)",icon:"❓"};
  if(score>=80)return{label:"Legendary",color:"#fbbf24",bg:"rgba(251,191,36,0.12)",icon:"🔥"};
  if(score>=65)return{label:"Hot Spot",color:"#f97316",bg:"rgba(249,115,22,0.12)",icon:"⭐"};
  if(score>=50)return{label:"Solid",color:"#22c55e",bg:"rgba(34,197,94,0.12)",icon:"👍"};
  if(score>=35)return{label:"Mid",color:"#a78bfa",bg:"rgba(167,139,250,0.12)",icon:"😐"};
  return{label:"Avoid",color:"#ef4444",bg:"rgba(239,68,68,0.12)",icon:"⚠️"};
}

// ─── AUTH (Supabase Auth REST) ────────────────────────────────────────────────
async function authAction(action, username, password, email) {
  const display = username.trim();
  if (!email || !email.includes("@"))
    return {success:false, message:"Please enter a valid email address."};
  if (!password || password.length < 6)
    return {success:false, message:"Password must be at least 6 characters."};

  if (action === "CREATE") {
    const uname = display.toLowerCase();
    if (!uname || uname.length < 3 || uname.length > 20)
      return {success:false, message:"Username must be 3-20 characters."};
    if (!/^[a-z0-9_]+$/.test(uname))
      return {success:false, message:"Username: letters, numbers, underscores only."};

    const res = await sbPost("/auth/v1/signup", {
      email: email.trim(), password, data: {username: display}
    });
    if (res.error) {
      if (res.error.message?.includes("already registered") || res.msg?.includes("already registered"))
        return {success:false, message:"Email already in use."};
      return {success:false, message: res.error.message || res.msg || "Signup failed."};
    }
    const token = res.access_token;
    const userId = res.user?.id || res.id;
    const fc = genCode();
    // Save profile using anon key if no token yet (email confirmation enabled)
    await fetch(SUPABASE_URL+"/rest/v1/profiles", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer "+(token || SUPABASE_ANON_KEY),
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify({id: userId, username: display, friend_code: fc})
    });
    // If no token, email confirmation is required
    if (!token) {
      return {success:true, isNew:true, username:display, token:null, friendCode:fc, userId,
        message:"Account created! Check your email to confirm before signing in."};
    }
    return {success:true, isNew:true, username:display, token, friendCode:fc, userId,
      message:"Welcome to TacoLog, "+display+"! 🌮"};
  }

  if (action === "LOGIN") {
    const res = await sbPost("/auth/v1/token?grant_type=password", {
      email: email.trim(), password
    });
    if (res.error || !res.access_token)
      return {success:false, message: res.error?.message || res.error_description || "Wrong email or password."};
    const token = res.access_token;
    const userId = res.user?.id;
    // Load profile for username + friend code (always trust DB, never email prefix)
    const profiles = await sbGet("/rest/v1/profiles?id=eq."+userId+"&select=username,friend_code", token);
    const profile = Array.isArray(profiles) ? profiles[0] : null;
    if (!profile?.username) return {success:false, message:"Account found but profile missing. Contact support."};
    return {success:true,
      username: profile.username,
      token, friendCode: profile.friend_code || genCode(), userId,
      message:"Welcome back, "+profile.username+"! 🌮"};
  }
  return {success:false, message:"Unknown error."};
}

async function loadAllReviews(token) {
  try {
    const data = await sbGet(
      "/rest/v1/reviews?select=*&order=created_at.desc&limit=500",
      token
    );
    if (!Array.isArray(data)) return [];
    return data.map(r => ({
      id: r.id, itemId: r.item_id, user: r.username, rating: r.rating,
      text: r.review_text, borough: r.borough, location: r.location,
      employees: r.employees, price: r.price, safetyLight: r.safety_light,
      date: new Date(r.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
      item: MENU_ITEMS.find(i => i.id === r.item_id),
    }));
  } catch(e) { console.error("loadAllReviews:", e); return []; }
}

async function saveReview(review, userId, token) {
  try {
    const r = await fetch(SUPABASE_URL+"/rest/v1/reviews", {
      method: "POST",
      headers: {...sbHeaders(token), "Prefer": "return=minimal"},
      body: JSON.stringify({
        item_id: review.itemId, username: review.user, user_id: userId,
        rating: review.rating, review_text: review.text || null,
        borough: review.borough || null, location: review.location || null,

        safety_light: review.safetyLight || null,
      })
    });
    return r.ok;
  } catch(e) { console.error("saveReview:", e); return false; }
}

                        {f.anthem.linkType==="spotify"&&<a href={f.anthem.url} target="_blank" rel="noopener noreferrer" style={{background:"#1db954",borderRadius:6,padding:"4px 10px",fontSize:10,fontWeight:800,color:"#fff",textDecoration:"none",flexShrink:0}}>▶ Spotify</a>}
                        {f.anthem.linkType==="soundcloud"&&<a href={f.anthem.url} target="_blank" rel="noopener noreferrer" style={{background:"#ff5500",borderRadius:6,padding:"4px 10px",fontSize:10,fontWeight:800,color:"#fff",textDecoration:"none",flexShrink:0}}>▶ SC</a>}

                      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>

                  📷<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{
                  // Resize to max 100x100 to keep under Supabase row limit
                  const img=new Image();
                  img.onload=()=>{
                    const canvas=document.createElement('canvas');
                    const max=100;
                    let w=img.width,h=img.height;
                    if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}
                    canvas.width=w;canvas.height=h;
                    canvas.getContext('2d').drawImage(img,0,0,w,h);
                    setAvatarUrl(canvas.toDataURL('image/jpeg',0.7));
                  };
                  img.src=ev.target.result;
                };r.readAsDataURL(f);}}}/>
                </label>}

                  :<a href={anthem.url} target="_blank" rel="noopener noreferrer" style={{width:38,height:38,borderRadius:"50%",background:anthem.linkType==="youtube"?"#ff0000":anthem.linkType==="spotify"?"#1db954":"#ff5500",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,textDecoration:"none"}}>▶️</a>

                </div>
              </div>}
            </div>}

            <div style={{background:"linear-gradient(135deg,rgba(124,58,237,0.15),rgba(219,39,119,0.1))",border:"1px solid #7c3aed",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div className="st" style={{fontSize:16,color:"#fbbf24",marginBottom:12}}>📊 BELL REPORT CARD</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:12}}>

              :myReviewsList.length===0
                ?<div style={{textAlign:"center",padding:"28px",color:"#5a3f80",border:"1px dashed #2a1550",borderRadius:12}}><p style={{fontSize:13}}>No ratings yet!</p><button className="btn" style={{marginTop:12,fontSize:13}} onClick={()=>openRatingModal()}>Log a Rating</button></div>

          </div>
        </div>

      {showModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div style={{background:"#120628",border:"1px solid #3a2060",borderRadius:"20px 20px 0 0",padding:"20px 16px",width:"100%",maxWidth:520,maxHeight:"88vh",overflowY:"auto",animation:"slideUp 0.3s ease",position:"relative",paddingBottom:80}}>
            <div style={{width:36,height:4,background:"#2a1550",borderRadius:2,margin:"0 auto 16px",flexShrink:0}}/>
            <button onClick={()=>{setShowModal(false);setModalItemId(null);}} style={{position:"absolute",top:14,right:14,background:"none",border:"none",color:"#7c5cad",fontSize:20,cursor:"pointer"}}>✕</button>

            <Field label="MENU ITEM *">

            <Field label="YOUR RATING *">
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>

              </div>
            </Field>

              </select>
            </Field>

            <Field label="💰 PRICE PAID">
              <div style={{position:"relative"}}><span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#7c5cad",fontWeight:800}}>$</span><input className="inp" style={{paddingLeft:24}} type="number" step="0.01" min="0" placeholder="0.00" value={draft.price} onChange={e=>setDraft(d=>({...d,price:e.target.value}))}/></div>

            <Field label="🚦 VIBE CHECK">

                {[{val:"green",color:"#22c55e",label:"All good"},{val:"yellow",color:"#eab308",label:"Felt sus"},{val:"red",color:"#ef4444",label:"Sketch city"}].map(opt=>(
                  <button key={opt.val} onClick={()=>setDraft(d=>({...d,safetyLight:d.safetyLight===opt.val?"":opt.val}))} style={{flex:1,padding:"10px 4px",borderRadius:10,border:"2px solid "+draft.safetyLight===opt.val?opt.color:"#2a1550",background:draft.safetyLight===opt.val?opt.color+"20":"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,minHeight:60}}>
                    <span style={{width:20,height:20,borderRadius:"50%",background:draft.safetyLight===opt.val?opt.color:opt.color+"44",display:"block"}}/>
                    <span style={{fontSize:10,fontWeight:700,color:draft.safetyLight===opt.val?opt.color:"#7c5cad"}}>{opt.label}</span>
                  </button>
                ))}
              </div>
            </Field>

            <Field label="👏 EMPLOYEE SHOUTOUT"><input className="inp" placeholder="Name the legend…" value={draft.employees} onChange={e=>setDraft(d=>({...d,employees:e.target.value}))}/></Field>
            <Field label="REVIEW"><textarea className="inp" rows={3} placeholder="Sauce level? Freshness? Worth the trek?" value={draft.text} onChange={e=>setDraft(d=>({...d,text:e.target.value}))} style={{resize:"none"}}/></Field>

            <button className="btn" style={{width:"100%",padding:"13px",fontSize:15}} disabled={!draft.rating||(!modalItemId&&!selectedItem)||!draft.location} onClick={submitReview}>Log Rating 🌮</button>
          </div>
        </div>
      )}

      {/* PONY OVERLAY */}
      {ponyPlaying&&(
        <div style={{position:"fixed",inset:0,zIndex:999,pointerEvents:"none",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center",animation:"ponyPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both"}}>
            <div style={{fontSize:80,animation:"ponyBounce 0.6s ease-in-out infinite alternate",filter:"drop-shadow(0 0 30px rgba(219,39,119,0.9))"}}>🐴</div>
            <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:24,letterSpacing:3,color:"#f472b6",marginTop:6,textShadow:"0 0 20px rgba(244,114,182,0.8)"}}>REVIEW LOGGED!</div>
          </div>
          <style>{`@keyframes ponyPop{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}@keyframes ponyBounce{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-12px) rotate(5deg)}}`}</style>
        </div>
      )}

      {/* EDIT REVIEW MODAL */}
      {editingReview&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&setEditingReview(null)}>
          <div style={{background:"#120829",borderRadius:"20px 20px 0 0",padding:"20px 18px 32px",width:"100%",maxWidth:520,maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,letterSpacing:2,color:"#c4b5fd"}}>✏️ EDIT REVIEW</div>
              <button onClick={()=>setEditingReview(null)} style={{background:"none",border:"none",color:"#5a3f80",fontSize:22,cursor:"pointer"}}>×</button>
            </div>
            {/* Stars */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"#c4b5fd",letterSpacing:1,marginBottom:6}}>RATING</div>
              <div style={{display:"flex",gap:6}}>
                {[1,2,3,4,5].map(s=>(
                  <button key={s} onClick={()=>setEditingReview(r=>({...r,rating:s}))} style={{fontSize:28,background:"none",border:"none",cursor:"pointer",filter:editingReview.rating>=s?"drop-shadow(0 0 6px #fbbf24)":"grayscale(1) opacity(0.3)"}}>⭐</button>
                ))}
              </div>
            </div>
            {/* Borough */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:"#c4b5fd",letterSpacing:1,marginBottom:6}}>BOROUGH</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {Object.keys(LOCATIONS_BY_BOROUGH).map(b=><button key={b} className="pb" onClick={()=>setEditingReview(r=>({...r,borough:b,location:""}))} style={{borderColor:editingReview.borough===b?BOROUGH_COLORS[b]:"#2a1550",background:editingReview.borough===b?BOROUGH_COLORS[b]+"28":"transparent",color:editingReview.borough===b?BOROUGH_COLORS[b]:"#9d7cc7",fontSize:11}}>{b}</button>)}
              </div>
            </div>
            {/* Location — required */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:"#c4b5fd",letterSpacing:1,marginBottom:6}}>LOCATION <span style={{color:"#f87171"}}>*</span></div>
              <select className="inp" style={{fontSize:12}} value={editingReview.location||""} onChange={e=>setEditingReview(r=>({...r,location:e.target.value}))}>
                <option value="">Select location…</option>
                {(editingReview.borough?LOCATIONS_BY_BOROUGH[editingReview.borough]||[]:ALL_LOCATIONS.map(l=>l.address)).map(a=><option key={a} value={a}>{a}</option>)}
              </select>
            </div>
            {/* Review text */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:"#c4b5fd",letterSpacing:1,marginBottom:6}}>REVIEW</div>
              <textarea className="inp" rows={3} style={{resize:"vertical",fontSize:13}} value={editingReview.text||""} onChange={e=>setEditingReview(r=>({...r,text:e.target.value}))} placeholder="What did you think?"/>
            </div>
            {/* Employees */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:"#c4b5fd",letterSpacing:1,marginBottom:6}}>👏 EMPLOYEE SHOUTOUT</div>
              <input className="inp" style={{fontSize:13}} value={editingReview.employees||""} onChange={e=>setEditingReview(r=>({...r,employees:e.target.value}))} placeholder="Name(s) who killed it"/>
            </div>
            <button className="btn" style={{width:"100%",padding:"13px",fontSize:15,marginTop:6}} onClick={saveEditedReview}>Save Changes ✅</button>
          </div>
        </div>
      )}

      {toast&&<div style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#7c3aed,#db2777)",color:"#fff",padding:"9px 20px",borderRadius:30,fontWeight:700,fontSize:13,zIndex:300,boxShadow:"0 8px 30px rgba(124,58,237,0.5)",whiteSpace:"nowrap"}}>{toast}</div>}
    </div>
  );
}

function LocationsView({locationScores,reviewsByLocation,setSelectedItem,setView}){
  const[locFilter,setLocFilter]=useState("All");
  const[locSort,setLocSort]=useState("score");
  const[locSearchQ,setLocSearchQ]=useState("");
  const[selectedLoc,setSelectedLoc]=useState(null);
  const scoredLocs=ALL_LOCATIONS.map(({borough,address})=>{const s=locationScores[address];return{borough,address,score:s,tier:getPopularityTier(s?s.total:null),reviews:reviewsByLocation[address]||[]};})
    .filter(l=>locFilter==="All"||l.borough===locFilter)
    .filter(l=>l.address.toLowerCase().includes(locSearchQ.toLowerCase()))
    .sort((a,b)=>{if(locSort==="score")return(b.score?b.score.total:-1)-(a.score?a.score.total:-1);if(locSort==="safety")return(b.score?b.score.safetyScore:-1)-(a.score?a.score.safetyScore:-1);if(locSort==="shoutouts")return(b.score?b.score.shoutoutScore:-1)-(a.score?a.score.shoutoutScore:-1);if(locSort==="price")return(b.score?b.score.priceScore:-1)-(a.score?a.score.priceScore:-1);return a.address.localeCompare(b.address);});
  return(
    <div>
      <h1 style={{fontFamily:"'Bebas Neue',cursive",fontSize:36,letterSpacing:3,marginBottom:6}}>📍 LOCATION RANKINGS</h1>
      <p style={{color:"#7c5cad",marginBottom:14,fontSize:12}}>Rating · Safety · Shoutouts · Price Value</p>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <input className="inp" style={{flex:1,minWidth:140}} placeholder="🔍 Search…" value={locSearchQ} onChange={e=>setLocSearchQ(e.target.value)}/>
        <select className="inp" style={{width:"auto",minWidth:140}} value={locSort} onChange={e=>setLocSort(e.target.value)}>
          <option value="score">Overall Score</option><option value="safety">Safest</option><option value="shoutouts">Most Shoutouts</option><option value="price">Best Value</option><option value="alpha">A–Z</option>
        </select>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {["All","Manhattan","Brooklyn","Bronx","Queens","Staten Island"].map(b=><button key={b} className="pb" onClick={()=>setLocFilter(b)} style={{borderColor:locFilter===b?(BOROUGH_COLORS[b]||"#7c3aed"):"#2a1550",background:locFilter===b?BOROUGH_COLORS[b]||"#7c3aed"+"28":"transparent",color:locFilter===b?(BOROUGH_COLORS[b]||"#7c3aed"):"#9d7cc7"}}>{b}</button>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {scoredLocs.map((loc,i)=>{
          const isSel=selectedLoc&&selectedLoc.address===loc.address;
          const bc=BOROUGH_COLORS[loc.borough]||"#7c3aed";
          const has=loc.score!==null&&loc.score!==undefined;
          return(
            <div key={loc.address}>
              <div onClick={()=>setSelectedLoc(isSel?null:loc)} style={{background:isSel?"rgba(124,58,237,0.14)":"rgba(26,13,53,0.9)",border:"1px solid "+isSel?"#7c3aed":"#2a1550",borderRadius:isSel?"13px 13px 0 0":13,padding:"11px 14px",cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:has?loc.tier.color+"22":"rgba(42,21,80,0.4)",border:"2px solid "+has?loc.tier.color:"#2a1550",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"'Bebas Neue',cursive",fontSize:i<3&&has?14:11,color:has?loc.tier.color:"#4a3070"}}>{has?(i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1):"—"}</div>
                  <div style={{flex:1,minWidth:0}}><div style={{fontWeight:800,fontSize:12,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{loc.address}</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{background:bc+"22",color:bc,padding:"1px 7px",borderRadius:20,fontSize:9,fontWeight:700}}>📍 {loc.borough}</span>
                      {has&&<span style={{background:loc.tier.bg,color:loc.tier.color,padding:"1px 7px",borderRadius:20,fontSize:9,fontWeight:700}}>{loc.tier.icon} {loc.tier.label}</span>}
                      {loc.reviews.length>0&&<span style={{color:"#5a3f80",fontSize:9}}>{loc.reviews.length} review{loc.reviews.length!==1?"s":""}</span>}
                    </div>
                  </div>
                  {has?<div style={{width:40,height:40,borderRadius:"50%",background:"conic-gradient("+loc.tier.color+" "+loc.score.total*3.6+"deg,#1a0d35 0deg)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><div style={{width:30,height:30,borderRadius:"50%",background:"#0d0520",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}><span style={{fontFamily:"'Bebas Neue',cursive",fontSize:12,color:loc.tier.color,lineHeight:1}}>{loc.score.total}</span></div></div>
                  :<div style={{width:40,height:40,borderRadius:"50%",background:"rgba(42,21,80,0.4)",border:"2px solid #2a1550",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16}}>❓</div>}
                </div>
              </div>
              {isSel&&(
                <div style={{background:"rgba(26,13,53,0.7)",border:"1px solid #7c3aed",borderTop:"none",borderRadius:"0 0 13px 13px",padding:"12px 14px"}}>
                  {has?<>
                    <ScoreBar label="⭐ Rating (35pts)" val={loc.score.ratingScore} max={35} color="#fbbf24"/>
                    <ScoreBar label="🚦 Safety (30pts)" val={loc.score.safetyScore} max={30} color="#22c55e"/>
                    <ScoreBar label="👏 Shoutouts (20pts)" val={loc.score.shoutoutScore} max={20} color="#a78bfa"/>
                    <ScoreBar label="💰 Price Value (15pts)" val={loc.score.priceScore} max={15} color="#f97316"/>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginTop:10}}>
                      {[{l:"Rating",v:loc.score.avgRating?loc.score.avgRating.toFixed(1)+"★":"—",c:"#fbbf24"},{l:"Safety",v:Math.round(loc.score.avgSafety*100)+"%",c:"#22c55e"},{l:"Shoutouts",v:loc.score.shoutouts,c:"#a78bfa"},{l:"Avg $",v:loc.score.avgPrice?"$"+loc.score.avgPrice.toFixed(2):"—",c:"#f97316"}].map(s=><div key={s.l} style={{background:"rgba(124,58,237,0.08)",borderRadius:8,padding:"7px",textAlign:"center"}}><div style={{fontSize:9,color:"#7c5cad",fontWeight:700}}>{s.l}</div><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:15,color:s.c}}>{s.v}</div></div>)}
                    </div>
                  </>:<div style={{textAlign:"center",padding:"14px",color:"#5a3f80",fontSize:12}}><p>No reviews yet.</p><button className="btn" style={{marginTop:10,fontSize:11,padding:"7px 16px"}} onClick={()=>setView("menu")}>Log a Visit</button></div>}
                  {loc.reviews.length>0&&<><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:14,letterSpacing:2,color:"#c4b5fd",margin:"12px 0 6px"}}>RECENT VISITS</div><div style={{display:"flex",flexDirection:"column",gap:7}}>{loc.reviews.slice(0,4).map(r=><ReviewCard key={r.id} r={r} avatarCache={avatarCache} onClick={r.item?()=>{setSelectedItem(r.item);setView("detail");}:undefined}/>)}</div></>}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
